services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://gendoc:gendoc@postgres:5432/gendoc
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chromadb:8000
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - chromadb

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gendoc
      POSTGRES_PASSWORD: gendoc
      POSTGRES_DB: gendoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  chromadata:
